<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Nail Art Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #333;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }
        .signup {
            margin-top: 20px;
            text-align: center;
        }
        .success {
            color: green;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Welcome to Our E-commerce Nail Art Store</h1>
    <div class="product">
        <h2>Nail Art Design 1</h2>
        <p>Price: $10</p>
        <button onclick="buyProduct('product1')">Buy Now</button>
    </div>
    <div class="product">
        <h2>Nail Art Design 2</h2>
        <p>Price: $12</p>
        <button onclick="buyProduct('product2')">Buy Now</button>
    </div>
    <div class="product">
        <h2>Nail Art Design 3</h2>
        <p>Price: $15</p>
        <button onclick="buyProduct('product3')">Buy Now</button>
    </div>
    <div class="product">
        <h2>Nail Art Design 4</h2>
        <p>Price: $8</p>
        <button onclick="buyProduct('product4')">Buy Now</button>
    </div>
    <div class="product">
        <h2>Nail Art Design 5</h2>
        <p>Price: $9</p>
        <button onclick="buyProduct('product5')">Buy Now</button>
    </div>
    <div class="product">
        <h2>Nail Art Design 6</h2>
        <p>Price: $11</p>
        <button onclick="buyProduct('product6')">Buy Now</button>
    </div>
    <div class="signup">
        <h2>Sign Up for Exclusive Offers!</h2>
        <input type="email" id="email" placeholder="Enter your email" required>
        <button onclick="subscribe()">Subscribe</button>
        <p class="success" id="success-message">Thank you for subscribing!</p>
    </div>

    <script>
        function buyProduct(product) {
            // Placeholder for Gumroad button functionality
            alert('Redirecting to Gumroad for ' + product);
        }

        function subscribe() {
            let emailInput = document.getElementById('email');
            if (emailInput.value) {
                document.getElementById('success-message').style.display = 'block';
                emailInput.value = '';
            }
        }
    </script>
</body>
</html>
